<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Essential News</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: Georgia, serif;
            background: #f5f5f0;
            color: #1a1a1a;
            max-width: 680px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        header {
            border-bottom: 2px solid #1a1a1a;
            padding-bottom: 16px;
            margin-bottom: 40px;
        }

        header h1 {
            font-size: 28px;
            font-weight: normal;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        header p {
            font-size: 13px;
            color: #666;
            margin-top: 6px;
        }

        .story {
            margin-bottom: 36px;
            padding-bottom: 36px;
            border-bottom: 1px solid #ddd;
        }

        .story:last-child {
            border-bottom: none;
        }

        .story h2 {
            font-size: 18px;
            font-weight: bold;
            line-height: 1.4;
            margin-bottom: 10px;
        }

        .story h2 a {
            color: #1a1a1a;
            text-decoration: none;
        }

        .story h2 a:hover {
            text-decoration: underline;
        }

        .story p {
            font-size: 15px;
            line-height: 1.7;
            color: #333;
        }

        .reason {
            font-size: 12px;
            color: #888;
            margin-top: 8px;
            font-style: italic;
        }

        footer {
            margin-top: 60px;
            font-size: 12px;
            color: #999;
            text-align: center;
        }
    </style>
</head>
<body>

    <header>
        <h1>Essential News</h1>
        <p>{{ date }} — {{ count }} stories that matter</p>
    </header>

    {% for story in stories %}
    <div class="story">
        <h2><a href="{{ story.link }}" target="_blank">{{ story.title }}</a></h2>
        <p>{{ story.summary }}</p>
        <p class="reason">Why it matters: {{ story.reason }}</p>
    </div>
    {% endfor %}

    <footer>
        Updated daily. Only news that affects the state of the world.
    </footer>

</body>
</html>
